services:
  - type: web
    name: grace-church-api
    env: node
    plan: free
    region: oregon
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

      # PostgreSQL on Render
      - key: DB_HOST
        fromDatabase:
          name: grace-church-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: grace-church-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: grace-church-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: grace-church-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: grace-church-postgres
          property: password
      - key: DB_SSL
        value: "true"

      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_REDIRECT_URI
        sync: false
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false
      - key: YOUTUBE_CHANNEL_ID
        sync: false

      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: TELEGRAM_HOME_BANNER_CHANNEL_ID
        sync: false
      - key: TELEGRAM_EVENT_AD_CHANNEL_ID
        sync: false

      - key: ALLOWED_ORIGINS
        value: "*"

      - key: MAX_FILE_SIZE_MB
        value: "500"

databases:
  - name: grace-church-postgres
    databaseName: grace_church_media
    user: grace_church_media_user
    plan: free
